<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Sentinel v2.0 | Pro Security</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: rgba(15, 23, 42, 0.82); --accent: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f1f5f9; min-height: 100vh; }
        .glass { background: var(--card); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .heading-font { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Dashboard Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-xl shadow-blue-500/20">
                    <i data-lucide="shield" class="text-white w-7 h-7"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-bold heading-font">System Sentinel <span class="text-blue-500">v2.0</span></h1>
                    <p class="text-slate-500 text-sm font-medium">Biometric Intelligence & Security Monitoring</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <div id="alert-pill" class="hidden px-4 py-2 bg-red-500/10 border border-red-500/20 rounded-full text-red-500 font-bold text-xs animate-pulse">
                     THREAT DETECTED
                </div>
                <button onclick="openRegisterModal()" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 px-8 py-3 rounded-2xl font-bold shadow-lg transition-all transform hover:scale-105">
                    Enroll Identity
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Left: Stats & Feed -->
            <div class="lg:col-span-8 space-y-6">
                <div class="glass p-6 rounded-3xl grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="p-4 bg-slate-800/40 rounded-2xl">
                        <p class="text-[10px] font-bold text-slate-500 uppercase">Profiles</p>
                        <h4 id="stat-profiles" class="text-2xl font-bold">--</h4>
                    </div>
                    <div class="p-4 bg-slate-800/40 rounded-2xl">
                        <p class="text-[10px] font-bold text-slate-500 uppercase">Today's Traffic</p>
                        <h4 id="stat-traffic" class="text-2xl font-bold">--</h4>
                    </div>
                    <div class="col-span-2 p-4 bg-blue-500/10 rounded-2xl border border-blue-500/10">
                         <p class="text-[10px] font-bold text-blue-400 uppercase">System Status</p>
                         <h4 class="text-2xl font-bold text-blue-400">OPERATIONAL</h4>
                    </div>
                </div>

                <div class="glass rounded-3xl overflow-hidden">
                    <div class="px-6 py-4 border-b border-slate-700/50 flex justify-between items-center bg-slate-800/30">
                        <h3 class="font-bold flex items-center gap-2"><i data-lucide="layout-list" class="w-4 h-4 text-emerald-400"></i> Access Stream</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-[10px] font-bold text-slate-500 uppercase tracking-widest border-b border-slate-700/20">
                                    <th class="px-6 py-4">Identification</th>
                                    <th class="px-6 py-4 text-right">Activity</th>
                                </tr>
                            </thead>
                            <tbody id="access-body">
                                <tr><td colspan="2" class="px-6 py-10 text-center text-slate-500 italic">Initializing data stream...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Right: Registry -->
            <div class="lg:col-span-4 flex flex-col gap-6">
                <div class="glass p-6 rounded-3xl flex-grow flex flex-col overflow-hidden">
                    <h3 class="font-bold flex items-center gap-2 mb-6"><i data-lucide="shield" class="w-4 h-4 text-blue-500"></i> Registry Gallery</h3>
                    <div id="registry-list" class="space-y-3 overflow-y-auto pr-2 custom-scroll flex-grow">
                         <div class="text-center py-10 text-slate-600 text-sm">Synchronizing profiles...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Enrollment Modal -->
    <div id="register-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center p-4 z-50">
        <div class="glass max-w-lg w-full rounded-3xl p-8 relative">
            <button onclick="closeRegisterModal()" class="absolute top-6 right-6 text-slate-500 hover:text-white"><i data-lucide="x"></i></button>
            <h2 class="text-2xl font-bold mb-6 heading-font">Enroll New Identity</h2>
            <div class="space-y-4">
                <input type="text" id="reg-name" placeholder="Full Name" class="w-full bg-slate-800 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-blue-500">
                <select id="reg-role" class="w-full bg-slate-800 rounded-2xl px-5 py-4 outline-none">
                    <option value="member">Member</option>
                    <option value="staff">Staff</option>
                    <option value="vip">VIP</option>
                </select>
                <div class="rounded-2xl overflow-hidden aspect-video bg-black relative">
                    <video id="webcam" autoplay playsinline class="w-full h-full object-cover"></video>
                </div>
                <button onclick="captureAndRegister()" id="capture-btn" class="w-full bg-blue-600 py-4 rounded-2xl font-bold shadow-lg">Start Enrollment</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let lastId = null;

        async function update() {
            try {
                const [lRes, uRes] = await Promise.all([fetch('/api/logs'), fetch('/api/users')]);
                const logs = await lRes.json();
                const users = await uRes.json();
                
                // Audio Alerts
                if(logs.length > 0 && logs[0].id !== lastId) {
                    const matched = users.find(u => u.id === logs[0].face_id);
                    if(matched?.role === 'vip' || matched?.is_blacklisted) {
                        new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3').play().catch(()=>{});
                    }
                    lastId = logs[0].id;
                }

                // Render Stats
                document.getElementById('stat-profiles').textContent = users.length;
                document.getElementById('stat-traffic').textContent = logs.filter(l => {
                    const d = new Date().toISOString().split('T')[0];
                    return l.timestamp.includes(d);
                }).length;

                // Render Logs
                document.getElementById('access-body').innerHTML = logs.map(l => {
                    const u = users.find(usr => usr.id === l.face_id);
                    const ts = l.timestamp; // Use raw local timestamp from server
                    const dateObj = new Date(ts.includes('T') ? ts : ts.replace(' ', 'T'));
                    const time = dateObj.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
                    const date = dateObj.toLocaleDateString();
                    return `
                        <tr class="hover:bg-blue-500/5 transition-all">
                            <td class="px-6 py-4 flex items-center gap-4">
                                <div class="w-12 h-12 rounded-xl overflow-hidden bg-slate-800 border border-slate-700/50">
                                    ${l.image_path ? `<img src="/${l.image_path}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-xs font-bold">${l.name[0]}</div>`}
                                </div>
                                <div>
                                    <div class="font-bold text-slate-200">${l.name}</div>
                                    <div class="text-[9px] uppercase font-bold text-slate-500 tracking-widest">${l.role}</div>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-right">
                                <span class="text-sm font-bold text-slate-300">${time}</span>
                                <div class="text-[9px] text-slate-600 font-medium">${date}</div>
                            </td>
                        </tr>
                    `;
                }).join('') || '<tr><td colspan="2" class="px-6 py-10 text-center text-slate-600 italic">No access records detected</td></tr>';

                // Render Gallery
                document.getElementById('registry-list').innerHTML = users.map(u => `
                    <div class="glass p-3 rounded-2xl flex items-center justify-between group ${u.is_blacklisted ? 'border-red-500/30 bg-red-500/5' : ''}">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-xl overflow-hidden bg-slate-800 border border-slate-700 flex items-center justify-center">
                                ${u.image_path ? `<img src="/${u.image_path}" class="w-full h-full object-cover">` : `<i data-lucide="user" class="w-5 h-5 text-slate-600"></i>`}
                            </div>
                            <div>
                                <h4 class="text-sm font-bold">${u.name}</h4>
                                <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">${u.role}</p>
                            </div>
                        </div>
                        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-all">
                            <button onclick="toggleB(${u.id}, ${!u.is_blacklisted})" class="p-2 text-slate-500 hover:text-red-500"><i data-lucide="shield-off" class="w-4 h-4"></i></button>
                            <button onclick="del(${u.id})" class="p-2 text-slate-500 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();

            } catch (e) {
                console.error("Dashboard Sync Fail:", e);
                document.getElementById('access-body').innerHTML = '<tr><td colspan="2" class="px-6 py-10 text-center text-red-500 italic">Error connecting to security server</td></tr>';
            }
        }

        async function toggleB(id, s) { await fetch(`/api/users/${id}/blacklist`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({is_blacklisted:s})}); update(); }
        async function del(id) { if(confirm("Delete record?")) { await fetch(`/api/users/${id}`, {method:'DELETE'}); update(); } }

        // Webcam Enrollment
        let v = document.getElementById('webcam');
        async function openRegisterModal() { document.getElementById('register-modal').classList.remove('hidden'); const s = await navigator.mediaDevices.getUserMedia({video:true}); v.srcObject = s; }
        function closeRegisterModal() { document.getElementById('register-modal').classList.add('hidden'); v.srcObject?.getTracks().forEach(t => t.stop()); }
        async function captureAndRegister() {
            const n = document.getElementById('reg-name').value;
            const r = document.getElementById('reg-role').value;
            const c = document.createElement('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            await fetch('/api/register', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:n, role:r, image_base64:c.toDataURL('image/jpeg')})});
            closeRegisterModal(); update();
        }

        setInterval(update, 3000);
        update();
    </script>
</body>
</html>
